plugins {
    id 'java'
    id 'maven-publish'
}

repositories {
    mavenCentral()
    mavenLocal()
}

group = 'de.jensd'
version '0.0.5.addon'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
    withSourcesJar()
    withJavadocJar()
}

[compileJava, compileTestJava]*.options*.encoding = 'UTF-8'

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}

dependencies {
    implementation 'de.jensd:addon-commons:16.0.0'
    implementation 'org.apache.logging.log4j:log4j-api:2.6'
    implementation 'org.apache.logging.log4j:log4j-core:2.6'
    implementation 'org.apache.logging.log4j:log4j-slf4j-impl:2.6'
    testImplementation 'junit:junit:4.10'
}
